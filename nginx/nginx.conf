events {
    worker_connections 1024;
}

http {
    upstream django_backend {
        server django:8000;
    }

    upstream flask_recomendaciones {
        server flask-recomendaciones:5000;
    }

    server {
        listen 80;
        server_name localhost;

        # ──────────────────────────────────────────────
        # Ruta estrangulada → microservicio Flask
        # Strangler Pattern: /api/v2/recomendaciones/
        # ──────────────────────────────────────────────
        location /api/v2/recomendaciones/ {
            proxy_pass         http://flask_recomendaciones;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }

        # Health check del microservicio Flask
        location /flask/health {
            proxy_pass http://flask_recomendaciones/health;
        }

        # ──────────────────────────────────────────────
        # Rutas antiguas → monolito Django
        # /api/v1/ (y /api/ para backward-compat)
        # ──────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://django_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
        }

        # Archivos estáticos de Django admin
        location /static/ {
            proxy_pass http://django_backend;
        }
    }
}